<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Recart · Our Live Popups</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #060d1e; }

  .screen {
    width: 100vw; height: 100vh;
    font-family: 'Inter', sans-serif;
    display: grid; grid-template-columns: 26% 1fr;
    overflow: hidden;
  }

  /* ── LEFT ── */
  .left {
    display: flex; flex-direction: column;
    padding: 5vh 4.5vw;
    border-right: 1px solid rgba(255,255,255,0.06);
    position: relative; z-index: 1;
  }
  .logo-wrap svg { height: clamp(18px,2.2vw,30px); width: auto; }
  .top-label {
    font-size: clamp(8px,0.82vw,11px); font-weight: 700;
    letter-spacing: 0.2em; text-transform: uppercase;
    color: #0375FF; margin-top: clamp(12px,2vh,22px);
  }
  .main-title {
    font-size: clamp(28px,5vw,70px); font-weight: 900;
    color: #fff; line-height: 0.9;
    text-transform: uppercase; letter-spacing: -0.03em;
    margin-top: clamp(8px,1.2vh,14px);
  }
  .main-title em { color: #0375FF; font-style: normal; display: block; }
  .divider {
    width: 36px; height: 3px; background: #0375FF;
    border-radius: 2px; margin: clamp(12px,2vh,22px) 0;
  }
  .stat-num {
    font-size: clamp(20px,3vw,44px); font-weight: 900;
    color: #0375FF; line-height: 1;
  }
  .stat-lbl {
    font-size: clamp(8px,0.82vw,11px); font-weight: 500;
    color: rgba(255,255,255,0.32); margin-top: 4px;
    letter-spacing: 0.04em;
  }
  .clock {
    margin-top: auto;
    font-size: clamp(9px,0.88vw,12px);
    color: rgba(255,255,255,0.25); letter-spacing: 0.05em;
  }

  /* ── RIGHT ── */
  .right {
    display: flex; align-items: center;
    padding: 3.5vh 3vw;
    gap: 1.6%;
    overflow: hidden;
  }

  .popup-slot {
    flex: 1;
    height: 84vh;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
  }

  /* ── POPUP CARDS ── */
  .popup-card {
    width: 100%; height: 100%;
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 32px 80px rgba(0,0,0,0.7), 0 0 0 1px rgba(255,255,255,0.07);
    transition: opacity 0.6s ease, transform 0.6s cubic-bezier(0.4,0,0.2,1);
  }
  .popup-card.fade-out {
    opacity: 0;
    transform: scale(0.9) translateY(20px);
    pointer-events: none;
  }
  .popup-card.fade-in-start {
    opacity: 0;
    transform: scale(0.9) translateY(-20px);
  }

  .pc-inner {
    width: 100%; height: 100%;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 7% 8%; gap: 3.5%;
    position: relative; overflow: hidden;
  }
  .pc-brand-name {
    font-weight: 700; letter-spacing: 0.1em;
    text-transform: uppercase; text-align: center; line-height: 1.2;
    font-size: clamp(10px,1.1vw,16px);
  }
  .pc-headline {
    text-align: center; line-height: 1.05;
  }
  .pc-headline .small {
    display: block;
    font-size: clamp(9px,1vw,14px); font-weight: 400;
    letter-spacing: 0.16em; text-transform: uppercase;
    margin-bottom: 3%;
  }
  .pc-headline .big {
    display: block;
    font-size: clamp(18px,2.8vw,42px); font-weight: 900;
    text-transform: uppercase; letter-spacing: -0.01em;
  }
  .pc-sub {
    font-size: clamp(7px,0.8vw,11px);
    text-align: center; line-height: 1.5; opacity: 0.7;
  }
  .mystery-boxes {
    display: flex; gap: 5%;
  }
  .mystery-box {
    width: clamp(34px,5.2vw,68px); height: clamp(34px,5.2vw,68px);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: clamp(16px,2.4vw,32px); font-weight: 900; color: #fff;
    box-shadow: 0 4px 14px rgba(0,0,0,0.18);
  }
  .pc-btn {
    width: 100%; padding: clamp(7px,1.4vh,16px) 10px;
    border-radius: 6px; cursor: default;
    font-size: clamp(8px,0.9vw,13px); font-weight: 700;
    text-align: center; text-transform: uppercase; letter-spacing: 0.07em;
  }
  .pc-btn-outline {
    width: 100%; padding: clamp(6px,1.1vh,12px) 10px;
    border-radius: 6px; cursor: default;
    font-size: clamp(7px,0.78vw,11px); font-weight: 600;
    text-align: center; text-transform: uppercase; letter-spacing: 0.07em;
    background: transparent;
  }
  .pc-input {
    display: flex; align-items: center;
    background: #fff; border-radius: 100px;
    padding: clamp(5px,1vh,12px) clamp(8px,1.2vw,16px);
    width: 100%; gap: 6px; color: #bbb;
    font-size: clamp(7px,0.8vw,11px);
  }
  .pc-circle {
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: clamp(24px,3.6vw,52px);
    width: clamp(68px,10vw,140px); height: clamp(68px,10vw,140px);
    box-shadow: 0 8px 24px rgba(0,0,0,0.12);
    flex-shrink: 0;
  }
</style>
</head>

function makeCard(innerHTML) {
  const el = document.createElement('div');
  el.className = 'popup-card';
  el.innerHTML = innerHTML;
  return el;
}

// ── CYCLING LOGIC ────────────────────────────────────────────────

const POPUP_BUILDERS = [
  cardGooseCreek,
  cardHerFantasyBox,
  cardScentiment,
  cardBurlebo,
  cardSimpleModern,
  cardWellnessCo,
  cardCarnivore,
];
const STEP = 3; // ensures no two visible slots show the same popup

function renderToSlot(slotEl, idx) {
  const card = POPUP_BUILDERS[idx % POPUP_BUILDERS.length]();
  slotEl.innerHTML = '';
  slotEl.appendChild(card);
  return card;
}

function initSlot(slotId, startIdx, initialDelay) {
  const slotEl = document.getElementById(slotId);
  let idx = ((startIdx % POPUP_BUILDERS.length) + POPUP_BUILDERS.length) % POPUP_BUILDERS.length;

  renderToSlot(slotEl, idx);

  function cycle() {
    const existing = slotEl.querySelector('.popup-card');
    if (existing) {
      existing.classList.add('fade-out');
      setTimeout(() => {
        idx = (idx + STEP) % POPUP_BUILDERS.length;
        const newCard = renderToSlot(slotEl, idx);
        newCard.classList.add('fade-in-start');
        requestAnimationFrame(() => requestAnimationFrame(() => {
          newCard.classList.remove('fade-in-start');
        }));
      }, 650);
    }
  }

  // Each slot cycles every 12 s; staggered 4 s apart → one change every 4 s
  setTimeout(() => setInterval(cycle, 12000), initialDelay);
}

initSlot('slot-0', 0, 0);
initSlot('slot-1', 2, 4000);
initSlot('slot-2', 4, 8000);

// ── CLOCK ────────────────────────────────────────────────────────
function tick() {
  const el = document.getElementById('clock-el');
  const now = new Date();
  if (el) el.textContent =
    now.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'}) + ' · ' +
    now.toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
}
tick();
setInterval(tick, 30000);
setTimeout(() => location.reload(), 60 * 60 * 1000);
</script>
