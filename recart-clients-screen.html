<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Recart · Our Live Popups</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #060d1e; }

  .screen {
    width: 100vw; height: 100vh;
    background: #060d1e; font-family: 'Inter', sans-serif;
    display: grid; grid-template-columns: 22% 1fr;
    position: relative; overflow: hidden;
  }

  /* ── LEFT (identical to map screen) ── */
  .left {
    position: relative; z-index: 10;
    background: #060d1e; /* explicit bg so nothing bleeds through */
    display: flex; flex-direction: column;
    padding: 4% 4%;
    border-right: 1px solid rgba(255,255,255,0.06);
  }
  .logo-wrap { margin-bottom: clamp(14px,2vh,28px); }
  .logo-wrap svg { height: clamp(20px,2.6vw,38px); width: auto; }
  .section-title {
    font-size: clamp(42px,6.8vw,96px); font-weight: 900; color: #fff;
    line-height: 0.88; text-transform: uppercase; letter-spacing: -0.03em;
    margin-bottom: clamp(12px,1.8vh,22px);
  }
  .spacer { flex: 1; }
  .clock {
    font-size: clamp(14px,1.6vw,22px); color: rgba(255,255,255,0.72);
    letter-spacing: 0.06em; padding-top: 6px;
  }

  /* ── RIGHT ── */
  .right {
    display: flex;
    align-items: stretch;
    overflow: hidden;
    position: relative; z-index: 1;
    padding: 2vh 1.5vw;
  }

  .popup-slot {
    position: relative; /* z-index works on positioned flex items */
    flex: 0 0 39%;
    min-width: 0;
    overflow: hidden;
    display: flex;
  }
  /* left→middle→right stacking: each card sits in front of the one to its left */
  #slot-0 { align-items: flex-start; padding-top: 5vh;    z-index: 1; }
  #slot-1 { margin-left: -8.5%; align-items: flex-end;   padding-bottom: 7vh; z-index: 2; }
  #slot-2 { margin-left: -8.5%; align-items: center;     padding-top: 2vh;    z-index: 3; }

  /* ── POPUP CARDS ── */
  .popup-card {
    width: 100%;
    height: auto;
    max-height: 84vh;
    border-radius: 14px;
    box-shadow: 0 24px 64px rgba(0,0,0,0.65), 0 0 0 1px rgba(255,255,255,0.06);
    display: block;
    transition: opacity 0.55s ease, transform 0.55s cubic-bezier(0.4,0,0.2,1);
  }
  .popup-card.fade-out {
    opacity: 0;
    transform: scale(0.91) translateY(14px);
    pointer-events: none;
  }
  .popup-card.fade-in-start {
    opacity: 0;
    transform: scale(0.91) translateY(-14px);
  }
</style>
</head>

<script>
const POPUPS = [
  { src: 'goose-creek.png',      alt: 'Goose Creek' },
  { src: 'her-fantasy-box.png',  alt: 'Her Fantasy Box' },
  { src: 'scentiment.png',       alt: 'Scentiment' },
  { src: 'burlebo.png',          alt: 'Burlebo' },
  { src: 'simple-modern.png',    alt: 'Simple Modern' },
  { src: 'wellness-company.png', alt: 'The Wellness Company' },
  { src: 'carnivore-snax.png',   alt: 'Carnivore Snax' },
];

const STEP = 3;
const BASE_ZINDEX = { 'slot-0': 1, 'slot-1': 2, 'slot-2': 3 };

function renderToSlot(slotEl, idx) {
  const img = document.createElement('img');
  img.src = POPUPS[idx % POPUPS.length].src;
  img.alt = POPUPS[idx % POPUPS.length].alt;
  img.className = 'popup-card';
  slotEl.innerHTML = '';
  slotEl.appendChild(img);
  return img;
}

function initSlot(slotId, startIdx, initialDelay) {
  const slotEl = document.getElementById(slotId);
  let idx = ((startIdx % POPUPS.length) + POPUPS.length) % POPUPS.length;

  renderToSlot(slotEl, idx);

  function cycle() {
    const existing = slotEl.querySelector('.popup-card');
    if (existing) {
      slotEl.style.zIndex = '10'; // bring to front during transition
      existing.classList.add('fade-out');
      setTimeout(() => {
        idx = (idx + STEP) % POPUPS.length;
        const newCard = renderToSlot(slotEl, idx);
        newCard.classList.add('fade-in-start');
        requestAnimationFrame(() => requestAnimationFrame(() => {
          newCard.classList.remove('fade-in-start');
        }));
        // restore base z-index after fade-in completes
        setTimeout(() => { slotEl.style.zIndex = BASE_ZINDEX[slotId]; }, 700);
      }, 650);
    }
  }

  setTimeout(() => setInterval(cycle, 7000), initialDelay);
}

initSlot('slot-0', 0, 0);
initSlot('slot-1', 2, 2334);
initSlot('slot-2', 4, 4667);

function tick() {
  const now = new Date(); const el = document.getElementById('clock-el');
  if (el) el.textContent = now.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'}) + ' · ' + now.toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
}
tick();
setInterval(tick, 30000);
setTimeout(() => location.reload(), 60 * 60 * 1000);
</script>
